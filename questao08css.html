<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Exercício 8</title>
    <style>
        #container-flex {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;

            padding: 20px;
            min-height: 200px;

            background-color: #b3d9ff;
            padding: 20px;
            flex: 1;

            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="container-flex">
        <div class="flex-item">Item 1<br>Texto exemplo</div>
        <div class="flex-item">Item 2<br>Centralizado verticalmente</div>
        <div class="flex-item">Item 3<br>Espaço distribuído</div>
        <div class="flex-item">Item 4<br>Encolhe proporcionalmente</div>
    </div>
</body>
</html>
