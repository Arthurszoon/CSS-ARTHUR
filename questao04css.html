<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 4</title>
    <style>
        .card {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Card 1</h3>
        <p>Este card tem fundo branco, bordas arredondadas, sombra leve, padding interno de 20px e margem inferior de 15px.</p>
    </div>
    
    <div class="card">
        <h3>Card 2</h3>
        <p>Outro card com o mesmo estilo, mostrando o espaçamento entre eles.</p>
    </div>
</body>
</html>
