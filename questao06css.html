<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 6</title>
    <style>
        a {
            color: #0066cc;
            text-decoration: none;
        }
        
        a:visited {
            color: #551a8b;
        }
        
        a:hover {
            color: #ff6600;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <p>Visite o <a href="https://www.google.com">Google</a> (link normal).</p>
    <p><a href="#">Link padrão</a> - sem sublinhado normalmente.</p>
    <p><a href="https://www.exemplo.com">Link visitado</a> (já visitado ficará roxo).</p>
    <p>Passe o mouse sobre qualquer link para ver a mudança de cor e aparecimento do sublinhado.</p>
</body>
</html>
