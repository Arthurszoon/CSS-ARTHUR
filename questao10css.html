<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 10</title>
    <style>
        .btn {
            background-color: #008000;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #005500;
        }
    </style>
</head>
<body>
    <button class="btn">Clique aqui</button>
    <br><br>
    <button class="btn">Outro botão</button>
    <br><br>
    <p>Passe o mouse sobre os botões para ver o efeito hover</p>
</body>
</html>
